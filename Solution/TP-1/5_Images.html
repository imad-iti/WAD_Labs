<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Exercise 5 - Images</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Images</h1>
      <h2>Simple Image</h2>
      <img src="Images/space.jpg"
           title="An image"
           width="500px"
           usemap="#example-map"
          >
      <!-- Rectangle Area -->
      <map name="example-map">
        <area shape="rect"
              coords="0,0,100,500"
              href="https://www.google.com"
              target="_blank"
              >

      <!-- Circle Area -->
       <area shape="circle" coords="400,100,100" href="nohref" target="_blank" onclick="alert('Circle clicked!')">
      </map>
